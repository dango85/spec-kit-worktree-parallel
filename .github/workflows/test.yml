name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Run create-worktree tests
        run: bash tests/test-create-worktree.sh

      - name: Run post-install tests
        run: bash tests/test-post-install.sh
