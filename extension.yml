schema_version: "1.0"

extension:
  id: worktrees
  name: "Worktrees"
  version: "1.4.0"
  description: "Default-on worktree isolation for parallel agents — sibling or nested layout"
  author: "dango85"
  repository: "https://github.com/dango85/spec-kit-worktree-parallel"
  license: "MIT"
  install_notes: |
    v1.4+: worktree-first SDD uses before_specify → speckit.worktrees.prepare-specify. Disable Git
    speckit.git.feature before_specify when using prepare (README). Open Cursor: use JSON
    open_ide_hint from the hook (e.g. cursor <path>). Cursor /worktree: README "Cursor IDE".

requires:
  speckit_version: ">=0.4.0"
  tools:
    - name: git
      required: true

provides:
  commands:
    - name: speckit.worktrees.create
      file: commands/speckit.worktrees.create.md
      description: "Spawn an isolated git worktree for a feature branch"
    - name: speckit.worktrees.list
      file: commands/speckit.worktrees.list.md
      description: "Dashboard of all active worktrees with spec-artifact and task progress"
    - name: speckit.worktrees.clean
      file: commands/speckit.worktrees.clean.md
      description: "Remove merged, orphaned, or stale worktrees and reclaim disk space"
    - name: speckit.worktrees.prepare-specify
      file: commands/speckit.worktrees.prepare-specify.md
      description: "Reserve branch + create git worktree before /speckit.specify (worktree-first SDD)"

  config:
    - name: "worktree-config.yml"
      template: "worktree-config.yml"
      description: "Worktree layout and behavior configuration"
      required: false

hooks:
  before_specify:
    command: speckit.worktrees.prepare-specify
    optional: false
    description: "Create git worktree before specify so specs land inside the worktree (disable Git speckit.git.feature before_specify)"

lifecycle:
  post_install:
    script: scripts/bash/post-install.sh
    description: "Add .worktrees/ to .gitignore so worktree directories are never committed to the main repo"

tags:
  - "worktree"
  - "git"
  - "parallel"
  - "isolation"
  - "agents"

config:
  defaults:
    layout: "nested"
    auto_create: true
    sibling_pattern: "{{repo}}--{{branch}}"
    dotworktrees_dir: ".worktrees"
